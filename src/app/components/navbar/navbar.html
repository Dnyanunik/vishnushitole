<nav class="cockpit-nav" [class.scrolled]="isScrolled">

  <div class="brand-zone">
    <div class="logo-text">
      <span class="highlight">VISHNU</span>
    </div>
    </div>

  <div class="desktop-menu">
    <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/about" class="nav-link" routerLinkActive="active">About Us</a>
    <a routerLink="/services" class="nav-link" routerLinkActive="active">Services</a>
    <a routerLink="/contact" class="nav-link" routerLinkActive="active">Contact</a>
  </div>

  <div class="action-zone">
    <button class="mobile-toggle" (click)="toggleMenu()" [class.open]="isMenuOpen">
      <span class="bar top"></span>
      <span class="bar mid"></span>
      <span class="bar bot"></span>
    </button>
  </div>

</nav>

<div class="mobile-overlay" [class.active]="isMenuOpen">

  <div class="cockpit-glare"></div>

  <div class="mobile-links">
    <a routerLink="/" (click)="toggleMenu()" style="--i:1;">
      <div class="icon-box"><mat-icon>home</mat-icon></div>
      <span>Home</span>
    </a>

    <a routerLink="/about" (click)="toggleMenu()" style="--i:2;">
      <div class="icon-box"><mat-icon>business</mat-icon></div>
      <span>About Us</span>
    </a>

    <a routerLink="/services" (click)="toggleMenu()" style="--i:3;">
      <div class="icon-box"><mat-icon>directions_car</mat-icon></div>
      <span>Services</span>
    </a>

    <a routerLink="/contact" (click)="toggleMenu()" style="--i:4;">
      <div class="icon-box"><mat-icon>support_agent</mat-icon></div>
      <span>Contact</span>
    </a>
  </div>

  </div>
