<section class="contact-section">
  <div class="header-banner">
    <h1>GET IN <span>TOUCH</span></h1>
  </div>

  <div class="container">
    <div class="info-grid">

      <mat-card class="contact-card">
        <div class="icon-circle">
          <mat-icon>location_on</mat-icon>
        </div>
        <mat-card-content>
          <h3>Visit Us</h3>
          <p>
            <strong>Karnik Heritage</strong>, Office No. 12, 4th floor,<br>
            Aapte Road, Behind Rupali Hotel,<br>
            Deccan Gymkhana, Pune - 411004
          </p>
          <a mat-stroked-button class="action-btn"
             href="https://maps.google.com/?q=Karnik+Heritage+Pune"
             target="_blank">
             Open Maps
          </a>
        </mat-card-content>
      </mat-card>

      <mat-card class="contact-card">
        <div class="icon-circle">
          <mat-icon>mail_outline</mat-icon>
        </div>
        <mat-card-content>
          <h3>Email Us</h3>
          <p>For inquiries and bookings:<br>
             <strong>Jijamatacontractor@gmail.com</strong>
          </p>
          <a mat-stroked-button class="action-btn"
             href="mailto:Jijamatacontractor@gmail.com?subject=Website Inquiry"
             target="_blank">
             Send Message
          </a>
        </mat-card-content>
      </mat-card>

    </div>

    <div class="map-container">
      <mat-card class="map-card">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.248385750035!2d73.8433!3d18.5186!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2c070c7333555%3A0x8670498b5940c74e!2sDeccan%20Gymkhana%2C%20Pune%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1710000000000"
          width="100%"
          height="400"
          style="border:0;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </mat-card>
    </div>
  </div>
</section>
