<section class="contact-section">
  <div class="header-banner">
    <h1>GET IN <span>TOUCH</span></h1>
  </div>

  <div class="container">
    <div class="info-grid">

      <mat-card class="contact-card">
        <div class="icon-circle">
          <mat-icon>location_on</mat-icon>
        </div>
        <mat-card-content>
          <h3>Visit Us</h3>
          <p>
            <strong>Vishnu Tours & Travels</strong>,<br>
            Spine Road, Pimpri-Chinchwad,<br>
            Maharashtra
          </p>
          <a mat-stroked-button class="action-btn"
             href="https://www.google.com/maps?q=18.6623000,73.8112000"
             target="_blank">
             Open Maps
          </a>
        </mat-card-content>
      </mat-card>

      <mat-card class="contact-card">
        <div class="icon-circle">
          <mat-icon>mail_outline</mat-icon>
        </div>
        <mat-card-content>
          <h3>Email Us</h3>
          <p>For inquiries and bookings:<br>
             <strong>vishnushitole978@gmail.com</strong>
          </p>
          <a mat-stroked-button class="action-btn"
             href="mailto:vishnushitole978@gmail.com?subject=Website Inquiry"
             target="_blank">
             Send Message
          </a>
        </mat-card-content>
      </mat-card>

    </div>

    <div class="map-container">
      <mat-card class="map-card">
        <iframe
          src="https://maps.google.com/maps?q=18.6623000,73.8112000&t=&z=15&ie=UTF8&iwloc=&output=embed"
          width="100%"
          height="400"
          style="border:0;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </mat-card>
    </div>
  </div>
</section>
